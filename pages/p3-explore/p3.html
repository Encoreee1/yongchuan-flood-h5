<!-- 第 3 页 · 互动一：寻找救援道具 -->
<div class="swiper-slide p3-slide">
  <div class="bg-cover p3-bg"></div>
  <div class="bg-overlay"></div>

  <div class="page-content p3-content">
    <div class="p3-header">
      <h2 class="page-title" style="font-size: 1.6rem;">🔍 寻找救援道具</h2>
      <p class="page-subtitle" style="font-size: var(--fs-sm);">点击杂物，找到关键救援工具</p>
    </div>

    <!-- 场景区域 -->
    <div class="p3-scene" id="p3Scene">
      <!-- 杂物热点：点击后消失，揭示道具 -->
      <div class="hotspot p3-hotspot" data-item="debris1" style="top: 25%; left: 20%; width: 60px; height: 60px;" title="翻开木板"></div>
      <div class="hotspot p3-hotspot" data-item="debris2" style="top: 40%; left: 60%; width: 55px; height: 55px;" title="移开碎石"></div>
      <div class="hotspot p3-hotspot" data-item="debris3" style="top: 60%; left: 35%; width: 65px; height: 65px;" title="掀开布料"></div>
      <div class="hotspot p3-hotspot" data-item="whistle" style="top: 45%; left: 38%; width: 50px; height: 50px; display: none;" title="应急求救哨"></div>

      <!-- 杂物可视化（纯 CSS） -->
      <div class="debris-item" id="debris1" style="top: 25%; left: 20%;">🪵</div>
      <div class="debris-item" id="debris2" style="top: 40%; left: 60%;">🪨</div>
      <div class="debris-item" id="debris3" style="top: 60%; left: 35%;">🧥</div>

      <!-- 哨子（隐藏，找到后显示） -->
      <div class="found-whistle" id="foundWhistle" style="display: none;">🪈</div>

      <!-- 被困人员（隐藏，滑动清理后显示） -->
      <div class="trapped-person" id="trappedPerson" style="display: none;">
        <span style="font-size: 3rem;">🧑‍🚒</span>
        <p>发现被困人员！</p>
      </div>
    </div>

    <!-- 操作提示 -->
    <div class="p3-hint" id="p3Hint">
      <span class="p3-hint-text">点击画面中可疑的杂物...</span>
    </div>

    <!-- 进度 -->
    <div class="p3-progress">
      <span>探索进度：</span>
      <span id="p3Progress">0/3 杂物已清理</span>
    </div>

    <!-- 滑动清理区（找到哨子后出现） -->
    <div class="p3-swipe-zone" id="p3SwipeZone" style="display: none;">
      <p>← 滑动清理障碍 →</p>
      <div class="swipe-track" id="swipeTrack">
        <div class="swipe-thumb" id="swipeThumb"></div>
      </div>
    </div>
  </div>
</div>
